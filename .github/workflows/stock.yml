name: 每日股票分析

on:
  workflow_dispatch:
  schedule:
    - cron: '30 10 * * *'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install yfinance pandas requests
      - name: Run analysis with AI
        env:
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python stock_analysis.py
      - name: Upload report (CSV)
        uses: actions/upload-artifact@v4
        with:
          name: stock-report
          path: report.csv
        continue-on-error: true
      - name: Upload AI report (TXT)
        uses: actions/upload-artifact@v4
        with:
          name: ai-analysis
          path: analysis_report.txt
        continue-on-error: true

  send-notification:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - name: Download AI report
        uses: actions/download-artifact@v4
        with:
          name: ai-report
      - name: Send DingTalk with AI Report
        env:
          WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
        run: |
          if [ -f analysis_report.txt ]; then
            REPORT=$(cat analysis_report.txt)
          else
            REPORT="AI分析报告未生成"
          fi
          ESCAPED_REPORT=$(echo "$REPORT" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          curl -X POST "$WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"股票 ${ESCAPED_REPORT}\"}}"

name: 每日股票分析

on:
  workflow_dispatch:
  schedule:
    - cron: '30 10 * * *'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install yfinance pandas requests
      
      - name: Run analysis
        env:
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
        run: python $GITHUB_WORKSPACE/stock_analysis.py
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: stock-report
          path: report.csv
        continue-on-error: true

  send-notification:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - name: Send DingTalk
        env:
          WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
        run: |
          curl -X POST "$WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d '{"msgtype":"text","text":{"content":"股票 今日分析已完成，报告已生成"}}'
